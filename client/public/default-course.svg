<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 400 225" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="225" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f2540"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <clipPath id="logoClip">
      <circle cx="200" cy="95" r="48"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="225" fill="url(#bg)"/>

  <!-- Decorative rings -->
  <circle cx="200" cy="95" r="68" fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1.5"/>
  <circle cx="200" cy="95" r="58" fill="none" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <circle cx="360" cy="20" r="70" fill="white" fill-opacity="0.03"/>
  <circle cx="40" cy="200" r="90" fill="white" fill-opacity="0.03"/>

  <!-- Dot grid -->
  <g fill="white" fill-opacity="0.05">
    <circle cx="20" cy="20" r="2"/><circle cx="60" cy="20" r="2"/><circle cx="340" cy="20" r="2"/><circle cx="380" cy="20" r="2"/>
    <circle cx="20" cy="180" r="2"/><circle cx="60" cy="180" r="2"/><circle cx="340" cy="180" r="2"/><circle cx="380" cy="180" r="2"/>
  </g>

  <!-- Logo circle background -->
  <circle cx="200" cy="95" r="48" fill="white" fill-opacity="0.1"/>

  <!-- Logo image -->
  <image href="/wathba-logo.png" x="152" y="47" width="96" height="96" clip-path="url(#logoClip)" preserveAspectRatio="xMidYMid meet"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="215" width="400" height="10" fill="url(#accent)" fill-opacity="0.7"/>

  <!-- Tagline -->
  <text x="200" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white" fill-opacity="0.45" letter-spacing="3">WATHBA · قفزة نحو التميز</text>
</svg>
